<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>มิตติ้งนี้ไปไหนดี?</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #4F3DFF;
    --bg: #F7F6F2;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #7B7B8E;
    --border: #E2E2EC;
    --radius: 16px;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 4rem; }

  .hero { background: var(--accent); padding: 2.5rem 1.5rem 3rem; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content:''; position:absolute; width:320px; height:320px; border-radius:50%; background:rgba(255,255,255,0.06); top:-100px; right:-80px; }
  .hero::after  { content:''; position:absolute; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.05); bottom:-60px; left:-40px; }
  .hero h1 { font-family:'Prompt',sans-serif; font-size:clamp(1.6rem,5vw,2.2rem); font-weight:700; color:#fff; position:relative; z-index:1; }
  .hero p  { color:rgba(255,255,255,0.75); font-size:0.95rem; margin-top:0.5rem; position:relative; z-index:1; }

  .container { max-width: 620px; margin: 0 auto; padding: 0 1rem; }

  .login-wrap { margin-top: -1.5rem; position: relative; z-index: 2; }
  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem 1.5rem; }
  .card-title { font-family:'Prompt',sans-serif; font-size:1.1rem; font-weight:600; margin-bottom:0.35rem; }
  .card-sub { font-size:0.875rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.5; }

  input[type="text"] { width:100%; padding:0.75rem 1rem; border:1.5px solid var(--border); border-radius:10px; font-family:'Sarabun',sans-serif; font-size:1rem; color:var(--text); background:var(--bg); transition:border-color 0.15s; outline:none; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"].error { border-color: #F04040; }
  .err-msg { font-size:0.8rem; color:#F04040; margin-top:0.4rem; display:none; }

  .btn { display:flex; align-items:center; justify-content:center; gap:0.5rem; width:100%; padding:0.85rem; border-radius:10px; border:none; font-family:'Prompt',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.15s, transform 0.1s; margin-top:0.9rem; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.42; cursor: not-allowed; transform: none; }

  .voter-badge { display:inline-flex; align-items:center; gap:0.4rem; background:#EEEEFF; color:var(--accent); border-radius:20px; padding:0.3rem 0.9rem; font-size:0.875rem; font-weight:500; margin:1.25rem 0 0.75rem; }
  .section-label { font-family:'Prompt',sans-serif; font-size:0.75rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin:1.5rem 0 0.75rem; }

  .places-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .place-card { background:var(--card); border:2px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:border-color 0.15s, transform 0.1s; user-select:none; }
  .place-card:hover { border-color: #B8B0FF; }
  .place-card.selected { border-color: var(--accent); }
  .place-card:active { transform: scale(0.98); }
  .place-thumb { width:100%; height:110px; object-fit:cover; display:block; background:var(--border); }
  .place-info { padding:0.65rem 0.75rem 0.75rem; display:flex; align-items:flex-start; gap:0.5rem; }
  .place-name { font-family:'Prompt',sans-serif; font-size:0.9rem; font-weight:600; }
  .place-desc { font-size:0.78rem; color:var(--muted); margin-top:2px; }
  .radio-dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--border); flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center; transition:border-color 0.15s, background 0.15s; }
  .place-card.selected .radio-dot { border-color:var(--accent); background:var(--accent); }
  .radio-dot::after { content:''; width:6px; height:6px; border-radius:50%; background:white; opacity:0; transition:opacity 0.15s; }
  .place-card.selected .radio-dot::after { opacity: 1; }

  .gallery-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; margin-top:0.75rem; }
  .gallery-name { font-family:'Prompt',sans-serif; font-size:0.85rem; font-weight:600; color:var(--muted); margin-bottom:0.65rem; }
  .gallery-imgs { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .gallery-imgs img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer; transition:opacity 0.15s, transform 0.1s; }
  .gallery-imgs img:hover { opacity:0.82; transform:scale(1.04); }

  .success-banner { display:flex; align-items:center; gap:0.6rem; background:#E6FAF3; border:1px solid #9FE5C9; border-radius:10px; padding:0.85rem 1rem; font-size:0.9rem; color:#077A4E; font-weight:500; margin-top:0.75rem; }

  .results-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; margin-top:0.75rem; }
  .result-row { margin-bottom:1rem; }
  .result-row:last-child { margin-bottom:0; }
  .result-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .result-place-name { font-family:'Prompt',sans-serif; font-size:0.9rem; font-weight:600; }
  .result-count { font-size:0.82rem; color:var(--muted); }
  .bar-bg { height:8px; background:var(--bg); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--accent); border-radius:99px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .result-voters { font-size:0.75rem; color:var(--muted); margin-top:4px; }

  .modal-bg { position:fixed; inset:0; background:rgba(10,10,20,0.82); z-index:999; display:flex; align-items:center; justify-content:center; padding:1.5rem; backdrop-filter:blur(4px); }
  .modal-bg img { max-width:min(90vw,700px); max-height:85vh; border-radius:12px; display:block; object-fit:contain; }
  .modal-close { position:fixed; top:1.25rem; right:1.25rem; background:rgba(255,255,255,0.15); border:none; color:white; width:40px; height:40px; border-radius:50%; font-size:1.25rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
  .modal-close:hover { background: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<div class="hero">
  <h1>🗺️ มิตติ้งนี้ไปไหนดี?</h1>
  <p>โหวตเลือกสถานที่ที่อยากไปด้วยกัน</p>
</div>

<div class="container">

  <div class="login-wrap" id="login-section">
    <div class="card">
      <div class="card-title">ยืนยันตัวตนก่อนโหวต</div>
      <div class="card-sub">ใส่ชื่อของคุณ เพื่อให้ระบบนับโหวตได้ถูกต้อง — แต่ละชื่อโหวตได้ครั้งเดียวเท่านั้น</div>
      <input type="text" id="name-input" placeholder="ชื่อเล่นหรือชื่อจริง เช่น มิ้ว, ต้น, แบม" />
      <div class="err-msg" id="name-error">กรุณาใส่ชื่อของคุณด้วยนะ</div>
      <button class="btn btn-primary" onclick="doLogin()">เข้าร่วมโหวต →</button>
    </div>
  </div>

  <div id="vote-section" style="display:none;">
    <div class="voter-badge">👤 <span id="voter-name-label"></span></div>

    <div id="already-voted-banner" style="display:none;" class="success-banner">
      ✅ <span id="already-voted-text"></span>
    </div>

    <div class="section-label">เลือกสถานที่</div>
    <div class="places-grid" id="places-grid"></div>

    <div class="gallery-card">
      <div class="gallery-name" id="gallery-name">รูปสถานที่</div>
      <div class="gallery-imgs" id="gallery-imgs"></div>
    </div>

    <button class="btn btn-primary" id="vote-btn" onclick="submitVote()" style="margin-top:1rem;">ยืนยันการโหวต ✓</button>

    <div id="voted-banner" style="display:none;" class="success-banner">
      🎉 <span id="voted-text"></span>
    </div>

    <div class="section-label" style="margin-top:1.75rem;">ผลโหวตทั้งหมด</div>
    <div class="results-card" id="results-list"></div>
  </div>

</div>

<div class="modal-bg" id="modal" style="display:none;" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="รูปขยาย" onclick="event.stopPropagation()" />
</div>

<script>
// ============================================================
// ✏️  แก้ตรงนี้เพื่อเปลี่ยนสถานที่และรูปภาพ
//     thumb  = รูปหน้าปก (เล็ก)
//     imgs   = รูปแกลเลอรี่ 3-5 รูป (ใส่ URL ได้เลย)
// ============================================================
const PLACES = [
  {
    id: 'khaoyai',
    name: 'เขาใหญ่',
    desc: 'ธรรมชาติ อากาศเย็น',
    thumb: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=400&q=70',
    imgs: [
      'https://images.unsplash.com/photo-1448375240586-882707db888b?w=800&q=80',
      'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=800&q=80',
      'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
      'https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=800&q=80',
      'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80',
    ]
  },
  {
    id: 'pattaya',
    name: 'พัทยา',
    desc: 'ทะเล บีช วิวสวย',
    thumb: 'https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?w=400&q=70',
    imgs: [
      'https://images.unsplash.com/photo-1506197603052-3cc9c3a201bd?w=800&q=80',
      'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80',
      'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=800&q=80',
      'https://images.unsplash.com/photo-1473186578172-c141e6798cf4?w=800&q=80',
      'https://images.unsplash.com/photo-1500375592092-40eb2168fd21?w=800&q=80',
    ]
  },
  {
    id: 'rooftop',
    name: 'รูฟท็อปกรุงเทพ',
    desc: 'บาร์ วิวเมือง ปาร์ตี้',
    thumb: 'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&q=70',
    imgs: [
      'https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=800&q=80',
      'https://images.unsplash.com/photo-1568495248636-6432b97bd949?w=800&q=80',
      'https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?w=800&q=80',
      'https://images.unsplash.com/photo-1514320291840-2e0a9bf2a9ae?w=800&q=80',
      'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800&q=80',
    ]
  },
  {
    id: 'chiangmai',
    name: 'เชียงใหม่',
    desc: 'วัด ไนท์มาร์เก็ต วัฒนธรรม',
    thumb: 'https://images.unsplash.com/photo-1490077476659-095159692ab5?w=400&q=70',
    imgs: [
      'https://images.unsplash.com/photo-1490077476659-095159692ab5?w=800&q=80',
      'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=800&q=80',
      'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80',
      'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?w=800&q=80',
      'https://images.unsplash.com/photo-1503917988258-f87a78e3c995?w=800&q=80',
    ]
  }
];
// ============================================================

let votes = {}, voters = {}, selectedId = null, currentUser = null, hasVoted = false;

function doLogin() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-error').style.display = 'block';
    document.getElementById('name-input').classList.add('error');
    return;
  }
  document.getElementById('name-error').style.display = 'none';
  document.getElementById('name-input').classList.remove('error');
  currentUser = name;
  hasVoted = !!voters[name];
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('vote-section').style.display = 'block';
  document.getElementById('voter-name-label').textContent = name;
  if (hasVoted) {
    document.getElementById('already-voted-banner').style.display = 'flex';
    document.getElementById('already-voted-text').textContent = `คุณโหวตให้ "${voters[name]}" ไปแล้ว ดูผลด้านล่างได้เลย`;
    const btn = document.getElementById('vote-btn');
    btn.disabled = true; btn.textContent = 'โหวตไปแล้ว';
  }
  renderPlaces(); renderGallery(PLACES[0].id); renderResults();
}

function selectPlace(id) {
  if (hasVoted) return;
  selectedId = id; renderPlaces(); renderGallery(id);
}

function renderPlaces() {
  const grid = document.getElementById('places-grid');
  grid.innerHTML = '';
  PLACES.forEach(p => {
    const div = document.createElement('div');
    div.className = 'place-card' + (selectedId === p.id ? ' selected' : '');
    div.innerHTML = `<img class="place-thumb" src="${p.thumb}" alt="${p.name}" loading="lazy" /><div class="place-info"><div style="flex:1"><div class="place-name">${p.name}</div><div class="place-desc">${p.desc}</div></div><div class="radio-dot"></div></div>`;
    div.onclick = () => selectPlace(p.id);
    grid.appendChild(div);
  });
}

function renderGallery(id) {
  const p = PLACES.find(x => x.id === id);
  if (!p) return;
  document.getElementById('gallery-name').textContent = `รูป ${p.name}`;
  const c = document.getElementById('gallery-imgs');
  c.innerHTML = '';
  p.imgs.forEach(url => {
    const img = document.createElement('img');
    img.src = url; img.alt = p.name; img.loading = 'lazy';
    img.onclick = () => openModal(url);
    c.appendChild(img);
  });
}

function submitVote() {
  if (!selectedId) { alert('เลือกสถานที่ก่อนนะ!'); return; }
  if (hasVoted) return;
  votes[selectedId] = (votes[selectedId] || 0) + 1;
  const placeName = PLACES.find(p => p.id === selectedId).name;
  voters[currentUser] = placeName;
  hasVoted = true;
  document.getElementById('voted-banner').style.display = 'flex';
  document.getElementById('voted-text').textContent = `โหวตให้ "${placeName}" เรียบร้อย!`;
  const btn = document.getElementById('vote-btn');
  btn.disabled = true; btn.textContent = 'โหวตแล้ว ✓';
  renderResults();
}

function renderResults() {
  const total = Object.values(votes).reduce((a, b) => a + b, 0);
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  PLACES.forEach(p => {
    const count = votes[p.id] || 0;
    const pct = total > 0 ? Math.round((count / total) * 100) : 0;
    const voterNames = Object.entries(voters).filter(([,v]) => v === p.name).map(([k]) => k).join(', ');
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `<div class="result-top"><span class="result-place-name">${p.name}</span><span class="result-count">${count} คน · ${pct}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>${voterNames ? `<div class="result-voters">${voterNames}</div>` : ''}`;
    list.appendChild(row);
  });
}

function openModal(src) { document.getElementById('modal-img').src = src; document.getElementById('modal').style.display = 'flex'; }
function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
